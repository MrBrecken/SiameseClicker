    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --bg: #ffffff; --text: #000000; --accent: #007AFF; --secondary: #f0f0f0; }
        * { box-sizing: border-box; user-select: none; -webkit-user-drag: none; outline: none; }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #fff; pointer-events: none; }

        .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .nav-btn { background: #000; color: #fff; border: none; border-radius: 10px; width: 50px; height: 50px; cursor: pointer; font-size: 2rem; display: flex; align-items: center; justify-content: center; }

        #clicker-container { cursor: pointer; transition: transform 0.05s; margin: 40px 0; z-index: 5; }
        #clicker-image { width: 360px; height: 360px; object-fit: contain; }
        #clicker-container:active { transform: scale(0.9); }

        .upgrade-card { background: var(--secondary); border-radius: 24px; padding: 20px; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; gap: 20px; border: 3px solid transparent; }
        .upgrade-card.locked { opacity: 0.2; filter: grayscale(1); cursor: not-allowed; }
        .upgrade-icon { width: 75px; height: 75px; border-radius: 16px; object-fit: cover; }
        .u-name { font-weight: 900; font-size: 1.2rem; display: block; text-transform: uppercase; }
        .u-cost { font-weight: 700; font-size: 0.95rem; color: #555; }

        #settings-trigger { position: fixed; bottom: 30px; left: 30px; background: #000; color: #fff; border: none; padding: 18px 28px; border-radius: 16px; cursor: pointer; font-weight: 900; font-size: 0.8rem; letter-spacing: 1.5px; z-index: 100; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .popup-box { background: #fff; padding: 40px; border-radius: 30px; width: 400px; text-align: center; }

        /* MINIGAME CONTAINERS */
        #flappy-container, #dash-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #flappy-container { background: #4ec0ca; }
        #dash-container { background: #000; }
        
        canvas.minigame-canvas { background: #fff; display: block; border: 5px solid #000; border-radius: 20px; cursor: pointer; }

        #rebirth-btn { width: 100%; padding: 25px; background: #000; color: #fff; border: none; font-weight: 900; border-radius: 20px; font-size: 1.3rem; cursor: pointer; transition: 0.3s; }
        #rebirth-btn:disabled { background: #eee !important; color: #aaa !important; box-shadow: none !important; }
        .particle { position: absolute; font-weight: 900; pointer-events: none; color: #000; animation: pOut 0.8s forwards; font-size: 2.2rem; z-index: 99; }
        @keyframes pOut { 0% { transform: translate(-50%,-50%); opacity: 1; } 100% { transform: translate(-50%,-200px); opacity: 0; } }
        
        .io-btn { margin-top: 10px; width: 100%; padding: 12px; background: #f0f0f0; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 0.7rem; }

        #dylan-flash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: white; color: black; z-index: 9999;
            display: none; align-items: center; justify-content: center;
            font-size: 8rem; font-weight: 900; text-align: center;
            animation: flashScale 0.2s infinite alternate;
        }
        @keyframes flashScale { from { transform: scale(1); } to { transform: scale(1.1); } }

        .death-screen { display: none; flex-direction: column; align-items: center; justify-content: center; }
        .death-stat { font-weight: 900; font-size: 1.5rem; margin: 5px 0; }

        .jarvis-coin {
            position: fixed;
            width: 80px;
            cursor: pointer;
            z-index: 500;
            transition: top linear; 
        }
    </style>
</head>

        <div class="death-stat">SPIKES JUMPED: <span id="d-death-score">0</span></div>

<script>
    let game = { 
        points: 0n, clickPower: 1n, pps: 0n, rebirths: 0n, megaRebirths: 0n, agencyIdx: 0, jarvisIdx: 0, page: 0, 
        muted: false, gems: 0, jarvisCoins: 0, musicStarted: false, pointMultiplier: 100n, gemsMultiplier: 1, 
        hasOversallsOpal: false, hasExtraLife: false, flappyRecord: 0, dashRecord: 0,
        jarvisMultiplier: 1, 
        dingleberry: { b: false, s: false, g: false, d: false }
    };
    
    let ashcroftPurchases = { dylan: 0 };
    const agencyImgs = ["Annotation 2025-12-18 203140.png","IMG_1114.png","IMG_3018.png","OIP (1).webp","OIP.webp","Screenshot 2026-01-11 211640.png","baldi.png-removebg-preview.png","blossom.gif","bradarwhatisthis.gif","dahmer-jeffrey.gif","image.png","rhythia-steam.png","rrxc12ej6dqtf7a18m4dy3vdk9vm.jpg","togif-1.gif","whoisalter.png"];
    const ashcroftImgs = ["dylandiamond.png", "oliversopal.png", "stevenssaphire.png"];
    
    const birdSprite = new Image(); birdSprite.src = 'IMG_3017.jpg';
    const pipeSprite = new Image(); pipeSprite.src = 'image0_15.gif.jpg';
    
    const dylanSprite = new Image(); dylanSprite.src = 'jdash.png';
    const spikeSprite = new Image(); spikeSprite.src = 'spike1---image.png';
    const dashBgImg = new Image(); dashBgImg.src = 'background.webp';

    function toBraille(str) { return str.split('').map(c => String.fromCharCode(0x2800 + (c.charCodeAt(0) - 7))).join(''); }
    function fromBraille(brl) { return brl.split('').map(c => String.fromCharCode((c.charCodeAt(0) - 0x2800) + 7)).join(''); }

    function exportData() {
        const json = JSON.stringify({game, ashcroftPurchases}, (key, value) => typeof value === 'bigint' ? value.toString() + 'n' : value);
        navigator.clipboard.writeText(toBraille(json));
        alert("BRAILLE DATA COPIED");
    }

    function importData() {
        const raw = prompt("PASTE BRAILLE DATA:");
        if(!raw) return;
        try {
            const decoded = fromBraille(raw.trim());
            const parsed = JSON.parse(decoded, (key, value) => {
                if(typeof value === 'string' && /^-?\d+n$/.test(value)) return BigInt(value.slice(0, -1));
                return value;
            });
            if (!parsed.game.dingleberry) parsed.game.dingleberry = { b: false, s: false, g: false, d: false };
            Object.assign(game, parsed.game); 
            Object.assign(ashcroftPurchases, parsed.ashcroftPurchases);
            render(); alert("DATA IMPORTED");
        } catch(e) { alert("INVALID BRAILLE DATA"); }
    }

    function triggerFlash() {
        const flash = document.getElementById('dylan-flash');
        flash.style.display = 'flex';
        setTimeout(() => { flash.style.display = 'none'; }, 1500);
    }

    function getRebirthCost() { return 10n ** (100n * (game.rebirths + 1n)); }
    function getMegaRebirthCost() { return 10n ** (1000n * (game.megaRebirths + 1n)); }

    function changePage(dir) { 
        game.page = (game.page + dir + 4) % 4; 
        document.getElementById('page-title').innerText = ["UPGRADES", "JARVIS BOTS", "ASHCROFTS JEWELS", "DYLANS DINGLEBERRIES"][game.page];
        render(); 
    }

    function render() {
        const rebirthMulti = 2n ** game.rebirths;
        const megaMulti = 5n ** game.megaRebirths;
        const ptsMultNum = Number(game.pointMultiplier) / 100;
        
        document.getElementById('points').innerText = format(game.points);
        document.getElementById('gem-count').innerText = game.gems;
        document.getElementById('jarvis-count').innerText = game.jarvisCoins;
        
        document.getElementById('stats').innerText = `+${format(game.clickPower * rebirthMulti * megaMulti * BigInt(Math.floor(ptsMultNum)))}/CLICK • ${format(game.pps * rebirthMulti * megaMulti * BigInt(Math.floor(ptsMultNum)))}/SEC`;
        document.getElementById('rebirth-count').innerText = `${game.rebirths} REBIRTHS | ${game.megaRebirths} MEGA`;
        
        const list = document.getElementById('upgrades-list');
        list.innerHTML = "";
        
        if (game.page === 0) {
            const cost = 50n * (12n ** BigInt(game.agencyIdx));
            createCard(getLockedName(game.agencyIdx), agencyImgs[game.agencyIdx % agencyImgs.length], cost, () => { 
                if(game.agencyIdx === 0) triggerFlash();
                game.points -= cost; game.clickPower += (cost / 10n) + 3n; game.agencyIdx++; render(); 
            });
        } else if (game.page === 1) {
            const cost = 1000n * (15n ** BigInt(game.jarvisIdx));
            const card = document.createElement('div');
            card.className = `upgrade-card ${game.points < cost ? 'locked' : ''}`;
            card.innerHTML = `<div class="upgrade-icon" style="display:flex; align-items:center; justify-content:center; color:red; font-weight:900; font-size:0.75rem; text-align:center;">Jarvis Error</div><div style="flex:1"><span class="u-name">Mk ${game.jarvisIdx + 1}</span><span class="u-cost">${format(cost)} Points</span></div>`;
            if (game.points >= cost) card.onclick = () => { 
                if(game.jarvisIdx === 0 && game.agencyIdx === 0) triggerFlash();
                game.points -= cost; game.pps += (cost / 8n) + 10n; game.jarvisIdx++; render(); 
            };
            list.appendChild(card);
        } else if (game.page === 2) {
            renderJewels();
        } else if (game.page === 3) {
            renderDingleberries();
        }

        const rBtn = document.getElementById('rebirth-btn');
        if (game.page === 1) {
            const mCost = getMegaRebirthCost();
            rBtn.innerText = `MEGA REBIRTH (${format(mCost)})`;
            rBtn.onclick = megaRebirth;
            rBtn.disabled = game.points < mCost;
            rBtn.style.background = "#333"; rBtn.style.boxShadow = "0 0 15px #ff9d00, inset 0 0 5px #ff9d00"; rBtn.style.color = "#ff9d00";
        } else {
            const rCost = getRebirthCost();
            rBtn.innerText = `REBIRTH (${format(rCost)})`;
            rBtn.onclick = rebirth;
            rBtn.disabled = game.points < rCost;
            rBtn.style.background = "#000"; rBtn.style.boxShadow = "none"; rBtn.style.color = "#fff";
        }
    }

    function renderJewels() {
        const list = document.getElementById('upgrades-list');
        const gemCost = BigInt(5 * (2 ** ashcroftPurchases['dylan']));
        createJewelCard("Dylans Diamond", ashcroftImgs[0], gemCost, () => { game.gems -= Number(gemCost); game.gemsMultiplier *= 2; ashcroftPurchases['dylan']++; render(); }, game.gems < Number(gemCost));
        createJewelCard("Olivers Opal", ashcroftImgs[1], 250n, () => { game.gems -= 250; game.pointMultiplier = 150n; game.hasOversallsOpal = true; render(); }, game.gems < 250 || game.hasOversallsOpal);
        createJewelCard("Steven Bradleys Saphire", ashcroftImgs[2], 5000n, () => { game.gems -= 5000; game.hasExtraLife = true; render(); }, game.gems < 5000 || game.hasExtraLife);
    }

    function createJewelCard(name, src, cost, onClick, isLocked) {
        const card = document.createElement('div');
        card.className = `upgrade-card ${isLocked ? 'locked' : ''}`;
        card.innerHTML = `<img src="${src}" class="upgrade-icon" onerror="this.src='OIP.webp'"><div style="flex:1"><span class="u-name">${name}</span><span class="u-cost">${format(cost)} Gems</span></div>`;
        if (!isLocked) card.onclick = onClick;
        document.getElementById('upgrades-list').appendChild(card);
    }

    function renderDingleberries() {
        createDingleberryCard("Bronze Jarvis Coin", "bronzejarvis.png", 5, () => {
            game.jarvisCoins -= 5; game.jarvisMultiplier *= 5;
            game.pointMultiplier = BigInt(Math.floor(Number(game.pointMultiplier) * 1.5));
            game.dingleberry.b = true; render();
        }, game.jarvisCoins < 5 || game.dingleberry.b, game.dingleberry.b);
        
        createDingleberryCard("Silver Jarvis Coin", "silverjarvis.png", 25, () => {
            game.jarvisCoins -= 25; game.gemsMultiplier *= 2; game.jarvisMultiplier *= 2; game.pointMultiplier *= 2n;
            game.dingleberry.s = true; render();
        }, game.jarvisCoins < 25 || game.dingleberry.s, game.dingleberry.s);
        
        createDingleberryCard("Gold Jarvis Coin", "goldjarvis.png", 500, () => {
            game.jarvisCoins -= 500; game.jarvisMultiplier *= 10;
            game.pointMultiplier = BigInt(Math.floor(Number(game.pointMultiplier) * 2.5));
            game.dingleberry.g = true; render();
        }, game.jarvisCoins < 500 || game.dingleberry.g, game.dingleberry.g);
        
        createDingleberryCard("Diamond Jarvis Coin", "diamondjarvis.png", 50000, () => {
            game.jarvisCoins -= 50000; game.jarvisMultiplier *= 100; game.pointMultiplier *= 5n; game.gemsMultiplier *= 3;
            game.dingleberry.d = true; render();
        }, game.jarvisCoins < 50000 || game.dingleberry.d, game.dingleberry.d);
    }

    function createDingleberryCard(name, src, cost, onClick, isLocked, isBought) {
        const card = document.createElement('div');
        card.className = `upgrade-card ${isLocked ? 'locked' : ''}`;
        let costText = isBought ? "SOLD OUT" : `${format(BigInt(cost))} Jarvis Coins`;
        card.innerHTML = `<img src="${src}" class="upgrade-icon" onerror="this.src='OIP.webp'"><div style="flex:1"><span class="u-name">${name}</span><span class="u-cost">${costText}</span></div>`;
        if (!isBought && !isLocked) card.onclick = onClick;
        document.getElementById('upgrades-list').appendChild(card);
    }

    function rebirth() { const rCost = getRebirthCost(); if(game.points >= rCost) { game.points = 0n; game.rebirths++; render(); } }

    function megaRebirth() {
        const mCost = getMegaRebirthCost();
        if(game.points >= mCost) {
            game.points = 0n; game.clickPower = 1n; game.pps = 0n; game.rebirths = 0n; game.agencyIdx = 0; game.jarvisIdx = 0;
            game.gems = 0; game.jarvisCoins = 0; game.pointMultiplier = 100n; game.gemsMultiplier = 1; game.jarvisMultiplier = 1;
            game.hasOversallsOpal = false; game.hasExtraLife = false; game.dingleberry = { b: false, s: false, g: false, d: false };
            ashcroftPurchases = { dylan: 0 }; game.megaRebirths++; render();
            alert("MEGA REBIRTH COMPLETE. ALL PROGRESS RESET, BUT YOU NOW HAVE A 5x MULTIPLIER.");
        }
    }

    window.addEventListener('keydown', (e) => {
        if(e.code === 'Space') {
            if(fActive) { birdV = -4.5; }
            else if(dActive) { if(!dJumping) { dV = -10; dJumping = true; } }
            else {
                const rebirthMulti = 2n ** game.rebirths;
                const megaMulti = 5n ** game.megaRebirths;
                const ptsMultNum = Number(game.pointMultiplier) / 100;
                game.points += game.clickPower * rebirthMulti * megaMulti * BigInt(Math.floor(ptsMultNum));
                render(); 
            }
            e.preventDefault();
        }
    });

    const suffixes = ["", "k", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc", "Ud", "Dd", "Td", "Qad", "Qid", "Sxd", "Spd", "Ocd", "Nod", "Vg"];
    function format(n) { if (n < 1000n) return n.toString(); let s = n.toString(); let unitIdx = Math.floor((s.length - 1) / 3); if (unitIdx >= suffixes.length) return s[0] + "." + s.substring(1,3) + "e" + (s.length - 1); let digits = s.length % 3 || 3; return s.substring(0, digits) + "." + s.substring(digits, digits + 2) + suffixes[unitIdx]; }
    function createCard(name, src, cost, onClick) { const card = document.createElement('div'); card.className = `upgrade-card ${game.points < cost ? 'locked' : ''}`; card.innerHTML = `<img src="${src}" class="upgrade-icon" onerror="this.src='OIP.webp'"><div style="flex:1"><span class="u-name">${name}</span><span class="u-cost">${format(cost)} Points</span></div>`; if (game.points >= cost) card.onclick = onClick; document.getElementById('upgrades-list').appendChild(card); }
    let lockedNames = []; function getLockedName(index) { while (lockedNames.length <= index) { const keywords = [["MrBrecken", "Mole East", "pussy ass"], ["Link", "Clicker", "Update"], ["East", "Siamese", "Agency"]]; lockedNames.push(`Agency ${keywords[0][Math.floor(Math.random()*3)]} ${keywords[1][Math.floor(Math.random()*3)]} ${keywords[2][Math.floor(Math.random()*3)]} #${lockedNames.length + 1}`); } return lockedNames[index]; }

    document.getElementById('clicker-container').onmousedown = (e) => {
        if(!game.musicStarted) { document.getElementById('main-music').play(); game.musicStarted = true; }
        const rebirthMulti = 2n ** game.rebirths;
        const megaMulti = 5n ** game.megaRebirths;
        const ptsMultNum = Number(game.pointMultiplier) / 100;
        const val = game.clickPower * rebirthMulti * megaMulti * BigInt(Math.floor(ptsMultNum));
        game.points += val;
        const p = document.createElement('div'); p.className = 'particle'; p.innerText = `+${format(val)}`; p.style.left = e.clientX + "px"; p.style.top = e.clientY + "px"; document.body.appendChild(p); setTimeout(() => p.remove(), 800); render();
    };

    setInterval(() => { 
        const rebirthMulti = 2n ** game.rebirths; 
        const megaMulti = 5n ** game.megaRebirths;
        const ptsMultNum = Number(game.pointMultiplier) / 100; 
        game.points += (game.pps * rebirthMulti * megaMulti * BigInt(Math.floor(ptsMultNum))); 
        render(); 
        localStorage.setItem('siameseSave', JSON.stringify({game, ashcroftPurchases}, (k, v) => typeof v === 'bigint' ? v.toString() + 'n' : v)); 
    }, 1000);
    
    function toggleOverlay(id) { const s = document.getElementById(id); s.style.display = s.style.display === 'flex' ? 'none' : 'flex'; }
    function toggleMute() { const m = document.getElementById('main-music'); game.muted = !game.muted; m.muted = game.muted; document.getElementById('mute-btn').innerText = game.muted ? "AUDIO: OFF" : "AUDIO: ON"; }

    const bgCanvas = document.getElementById('bg-canvas'); const bgCtx = bgCanvas.getContext('2d'); let bgBlobs = []; function initBg() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; bgBlobs = Array.from({length: 8}, (v, i) => ({ x: Math.random()*bgCanvas.width, y: Math.random()*bgCanvas.height, vx: Math.random()*1.5-0.75, vy: Math.random()*1.5-0.75, r: Math.random()*400+200, c: ['#8A2BE2', '#4169E1', '#FF69B4', '#00BFFF', '#9370DB'][i % 5] })); }
    function drawBg() { bgCtx.fillStyle = '#fff'; bgCtx.fillRect(0,0,bgCanvas.width,bgCanvas.height); bgCtx.filter = 'blur(50px)'; bgBlobs.forEach(b => { bgCtx.fillStyle = b.c; bgCtx.beginPath(); bgCtx.arc(b.x, b.y, b.r, 0, Math.PI*2); bgCtx.fill(); b.x += b.vx; b.y += b.vy; if(b.x < -b.r || b.x > bgCanvas.width+b.r) b.vx *= -1; if(b.y < -b.r || b.y > bgCanvas.height+b.r) b.vy *= -1; }); bgCtx.filter = 'none'; requestAnimationFrame(drawBg); }
    window.addEventListener('resize', initBg); initBg(); drawBg();

    /* FLAPPY LOGIC */
    const fc = document.getElementById('flappy-canvas'); const fctx = fc.getContext('2d'); let fScore = 0, birdY = 250, birdV = 0, pipes = [], fActive = false, fAnim, fSessionGems = 0;
    function startFlappy() { 
        if(document.getElementById('minigame-menu').style.display === 'flex') toggleOverlay('minigame-menu'); 
        document.getElementById('flappy-death').style.display = 'none';
        document.getElementById('flappy-gameplay').style.display = 'flex';
        document.getElementById('flappy-container').style.display = 'flex'; 
        fc.width = 400; fc.height = 500; fScore = 0; birdY = 250; birdV = 0; pipes = []; fActive = true; fSessionGems = 0;
        document.getElementById('f-score').innerText = "0"; flappyLoop(); 
    }
    function dieFlappy() { 
        if(game.hasExtraLife) { game.hasExtraLife = false; birdY = 250; birdV = -4.5; return; } 
        fActive = false; cancelAnimationFrame(fAnim); 
        if(fScore > (game.flappyRecord || 0)) game.flappyRecord = fScore;
        document.getElementById('flappy-gameplay').style.display = 'none';
        document.getElementById('flappy-death').style.display = 'flex';
        document.getElementById('f-death-score').innerText = fScore;
        document.getElementById('f-death-best').innerText = game.flappyRecord;
        document.getElementById('f-death-gems').innerText = fSessionGems;
        render(); 
    }
    function exitFlappy() { fActive = false; cancelAnimationFrame(fAnim); document.getElementById('flappy-container').style.display = 'none'; render(); }
    fc.onmousedown = (e) => { if(fActive) { birdV = -4.5; e.preventDefault(); } };
    function flappyLoop() { if(!fActive) return; fctx.fillStyle = '#4ec0ca'; fctx.fillRect(0,0,400,500); birdV += 0.2; birdY += birdV; fctx.drawImage(birdSprite, 50, birdY, 40, 40); if(pipes.length === 0 || pipes[pipes.length-1].x < 180) pipes.push({ x: 400, h: Math.random()*200+50, scored: false }); pipes.forEach((p, i) => { p.x -= 1.5; fctx.drawImage(pipeSprite, p.x, 0, 60, p.h); fctx.drawImage(pipeSprite, p.x, p.h + 140, 60, 500); if(!p.scored && p.x < 50) { p.scored = true; fScore++; document.getElementById('f-score').innerText = fScore; if(fScore % 10 === 0) { let earned = game.gemsMultiplier; game.gems += earned; fSessionGems += earned; } } if(p.x < 90 && p.x + 60 > 50) { if(birdY + 5 < p.h || birdY + 35 > p.h + 140) dieFlappy(); } if(p.x < -60) pipes.splice(i, 1); }); if(birdY > 500 || birdY < -40) dieFlappy(); fAnim = requestAnimationFrame(flappyLoop); }

    /* DYLAN DASH LOGIC */
    const dc = document.getElementById('dash-canvas'); const dctx = dc.getContext('2d');
    let dActive = false, dAnim, dScore = 0, dGems = 0, dSpeed = 4, dDylanY = 350, dV = 0, dJumping = false, dSpikes = [], dScroll = 0, dGemGain = 1;
    function startDylanDash() {
        if(document.getElementById('minigame-menu').style.display === 'flex') toggleOverlay('minigame-menu');
        document.getElementById('dash-death').style.display = 'none';
        document.getElementById('dash-gameplay').style.display = 'flex';
        document.getElementById('dash-container').style.display = 'flex';
        dc.width = 600; dc.height = 450; dScore = 0; dGems = 0; dSpeed = 4; dDylanY = 350; dV = 0; dJumping = false; dSpikes = []; dScroll = 0; dActive = true; dGemGain = 1;
        document.getElementById('d-score').innerText = "0"; dashLoop();
    }
    function exitDash() { dActive = false; cancelAnimationFrame(dAnim); document.getElementById('dash-container').style.display = 'none'; render(); }
    dc.onmousedown = (e) => { if(dActive && !dJumping) { dV = -10; dJumping = true; e.preventDefault(); } };
    function dashLoop() {
        if(!dActive) return;
        dScroll -= dSpeed; if(dScroll <= -600) dScroll = 0;
        dctx.drawImage(dashBgImg, dScroll, 0, 600, 450); dctx.drawImage(dashBgImg, dScroll + 600, 0, 600, 450);
        dV += 0.5; dDylanY += dV; if(dDylanY > 350) { dDylanY = 350; dV = 0; dJumping = false; }
        dctx.drawImage(dylanSprite, 50, dDylanY, 60, 60);
        if(dSpikes.length === 0 || dSpikes[dSpikes.length-1].x < (600 - (200 + Math.random() * 150))) dSpikes.push({ x: 600, scored: false });
        dSpikes.forEach((s, i) => {
            s.x -= dSpeed; dctx.drawImage(spikeSprite, s.x, 360, 50, 50);
            if(!s.scored && s.x < 50) {
                s.scored = true; dScore++; document.getElementById('d-score').innerText = dScore;
                if(dScore % 5 === 0) { dGems += dGemGain; game.gems += dGemGain; dSpeed += 0.5; }
                if(dScore % 10 === 0) { dGemGain++; }
            }
            if(s.x < 100 && s.x + 40 > 60 && dDylanY + 50 > 360) dieDash();
            if(s.x < -50) dSpikes.splice(i, 1);
        });
        dAnim = requestAnimationFrame(dashLoop);
    }
    function dieDash() {
        if(game.hasExtraLife) { game.hasExtraLife = false; dDylanY = 350; dV = -10; dJumping = true; return; }
        dActive = false; cancelAnimationFrame(dAnim);
        if(dScore > (game.dashRecord || 0)) game.dashRecord = dScore;
        document.getElementById('dash-gameplay').style.display = 'none';
        document.getElementById('dash-death').style.display = 'flex';
        document.getElementById('d-death-score').innerText = dScore;
        document.getElementById('d-death-best').innerText = game.dashRecord;
        document.getElementById('d-death-gems').innerText = dGems;
        render();
    }

    function spawnJarvisCoin() {
        if (Math.random() > 0.5) return; 
        const coin = document.createElement('img');
        const fallTime = Math.floor(Math.random() * 11) + 5; 
        coin.src = 'jiojoijio.png'; coin.className = 'jarvis-coin';
        coin.style.left = Math.random() * (window.innerWidth - 80) + 'px'; coin.style.top = '-100px'; coin.style.transition = `top ${fallTime}s linear`;
        document.body.appendChild(coin);
        setTimeout(() => { coin.style.top = (window.innerHeight + 100) + 'px'; }, 100);
        coin.onclick = () => { game.jarvisCoins += (1 * game.jarvisMultiplier); render(); coin.remove(); };
        setTimeout(() => { if(coin.parentNode) coin.remove(); }, (fallTime + 1) * 1000);
    }
    setInterval(spawnJarvisCoin, 60000); 

    try { 
        const saved = localStorage.getItem('siameseSave'); 
        if (saved) { 
            const parsed = JSON.parse(saved, (k, v) => typeof v === 'string' && /^-?\d+n$/.test(v) ? BigInt(v.slice(0, -1)) : v); 
            if (!parsed.game.dingleberry) parsed.game.dingleberry = { b: false, s: false, g: false, d: false };
            Object.assign(game, parsed.game); Object.assign(ashcroftPurchases, parsed.ashcroftPurchases); 
        } 
    } catch(e) {}
    render();
</script>
