<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siamese Agency Clicker</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #000000;
            --secondary: rgba(243, 244, 246, 0.85);
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; user-select: none; -webkit-user-drag: none; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- CUSTOM LIQUID B&W BACKGROUND --- */
        #liquid-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(45deg, #e0e0e0 25%, #ffffff 25%, #ffffff 50%, #e0e0e0 50%, #e0e0e0 75%, #ffffff 75%, #ffffff 100%);
            background-size: 100px 100px;
            filter: blur(60px);
            opacity: 0.4;
            animation: flow 10s linear infinite;
        }

        @keyframes flow {
            from { background-position: 0 0; }
            to { background-position: 200px 200px; }
        }

        #effect-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* --- Layout --- */
        #game-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }

        #sidebar {
            width: 380px;
            border-left: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.3s ease;
        }

        #points { font-size: 5rem; font-weight: 900; margin: 0; letter-spacing: -3px; }

        /* --- Navigation Arrows --- */
        .nav-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            font-weight: 900;
            padding: 10px;
            transition: transform 0.2s;
        }

        .nav-btn:hover { transform: scale(1.2); color: var(--accent); }

        /* --- The Clicker --- */
        #clicker-container {
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #clicker-image { width: 320px; height: 320px; object-fit: contain; }
        #clicker-container:active { transform: scale(0.9); }

        /* --- Upgrade Cards --- */
        .upgrade-card {
            background: var(--secondary);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .upgrade-card:hover:not(.locked) { background: #fff; border-color: #000; transform: translateX(-5px); }
        .upgrade-card.locked { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }

        .upgrade-icon { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #ddd; }
        .upgrade-info { flex: 1; }
        .u-name { font-weight: 800; font-size: 0.9rem; display: block; }
        .u-cost { font-weight: 700; font-size: 0.8rem; color: #666; }

        /* --- Rebirth --- */
        #rebirth-area { margin-top: auto; border-top: 1px solid var(--border); padding-top: 20px; }
        #rebirth-btn {
            width: 100%; padding: 15px; background: #000; color: #fff; border: none; 
            font-weight: 900; border-radius: 8px; cursor: pointer;
        }
        #rebirth-btn:disabled { background: #ccc; }

        /* Floating Text */
        .particle {
            position: absolute; font-weight: 900; pointer-events: none;
            animation: pOut 0.8s ease-out forwards;
        }
        @keyframes pOut {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -120px) scale(1.5); opacity: 0; }
        }

        .floating-item {
            position: absolute; width: 60px; height: 60px; opacity: 0.25;
            animation: floatLoop 20s linear infinite; border-radius: 50%;
        }
        @keyframes floatLoop {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(100px, 100px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="liquid-canvas"></div>
<div id="effect-layer"></div>

<div id="game-view">
    <div style="text-align: center;">
        <div style="font-weight: 900; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; color: #666;">Siamese Wealth</div>
        <h1 id="points">0</h1>
    </div>

    <div id="clicker-container">
        <img id="clicker-image" src="IMG_2109-removebg-preview.png" alt="The Idiot">
    </div>
</div>

<div id="sidebar">
    <div class="nav-header">
        <button class="nav-btn" onclick="changePage(-1)">←</button>
        <h2 id="page-title" style="font-weight: 900; margin: 0; font-size: 1.2rem;">AGENCY UPGRADES</h2>
        <button class="nav-btn" onclick="changePage(1)">→</button>
    </div>

    <div id="upgrades-list" style="flex: 1; overflow-y: auto;"></div>
    
    <div id="rebirth-area">
        <button id="rebirth-btn" onclick="rebirth()">REBIRTH</button>
        <div id="rebirth-stat" style="text-align:center; font-size:0.7rem; font-weight:800; margin-top:10px; color:#666;">0 REBIRTHS (2x MULTI)</div>
    </div>
</div>

<script>
    let game = {
        points: 0n,
        clickPower: 1n,
        rebirths: 0n,
        upgradeLevel: 0,
        jarvisLevel: 0,
        currentPage: 0 // 0: Agency, 1: Jarvis
    };

    const agencyData = [
        { name: "Rhythia Sync", img: "rhythia-steam.png" },
        { name: "Mugshot Protocol", img: "OIP.webp" },
        { name: "Agency Syrup", img: "OIP (1).webp" },
        { name: "Gif Loop", img: "togif.gif" },
        { name: "Alter Intel", img: "whoisalter.png" }
    ];

    function format(n) {
        if (n < 1000n) return n.toString();
        const units = ["", "k", "M", "B", "T", "Qa", "Qi", "Sx"];
        let s = n.toString();
        let unitIdx = Math.floor((s.length - 1) / 3);
        let digits = s.length % 3 || 3;
        return s.substring(0, digits) + "." + s.substring(digits, digits + 2) + units[unitIdx];
    }

    function changePage(dir) {
        game.currentPage = (game.currentPage + dir + 2) % 2;
        document.getElementById('page-title').innerText = game.currentPage === 0 ? "AGENCY UPGRADES" : "JARVIS BOTS";
        render();
    }

    function spawnFloating(src) {
        if(!src) return;
        const img = document.createElement('img');
        img.src = src;
        img.className = 'floating-item';
        img.style.left = Math.random() * 80 + 10 + "%";
        img.style.top = Math.random() * 80 + 10 + "%";
        document.getElementById('effect-layer').appendChild(img);
    }

    function render() {
        document.getElementById('points').innerText = format(game.points);
        document.getElementById('rebirth-stat').innerText = `${game.rebirths} REBIRTHS (${2n**game.rebirths}x MULTI)`;
        
        const list = document.getElementById('upgrades-list');
        list.innerHTML = "";

        if (game.currentPage === 0) {
            // Agency Upgrades Page
            const up = agencyData[game.upgradeLevel % agencyData.length];
            const cost = 10n ** BigInt(game.upgradeLevel + 1) * 5n;
            createCard(up.name, up.img, cost, () => {
                game.points -= cost;
                game.clickPower += (cost / 10n);
                spawnFloating(up.img);
                game.upgradeLevel++;
                render();
            });
        } else {
            // Jarvis Bots Page
            const cost = 10n ** BigInt(game.jarvisLevel + 2) * 2n;
            createCard(`Jarvis Unit ${game.jarvisLevel + 1}`, "", cost, () => {
                game.points -= cost;
                game.clickPower += (cost / 5n);
                game.jarvisLevel++;
                render();
            });
        }

        const rCost = 1000000n * (100n ** game.rebirths);
        document.getElementById('rebirth-btn').disabled = game.points < rCost;
        document.getElementById('rebirth-btn').innerText = `REBIRTH (${format(rCost)})`;
    }

    function createCard(name, img, cost, onClick) {
        const card = document.createElement('div');
        card.className = `upgrade-card ${game.points < cost ? 'locked' : ''}`;
        card.innerHTML = `
            <img src="${img}" class="upgrade-icon">
            <div class="upgrade-info">
                <span class="u-name">${name}</span>
                <span class="u-cost">Cost: ${format(cost)}</span>
            </div>
        `;
        if (game.points >= cost) card.onclick = onClick;
        document.getElementById('upgrades-list').appendChild(card);
    }

    document.getElementById('clicker-container').onmousedown = (e) => {
        const val = game.clickPower * (2n ** game.rebirths);
        game.points += val;
        
        const p = document.createElement('div');
        p.className = 'particle';
        p.innerText = `+${format(val)}`;
        p.style.left = e.clientX + "px";
        p.style.top = e.clientY + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
        render();
    };

    function rebirth() {
        const cost = 1000000n * (100n ** game.rebirths);
        if (game.points >= cost) {
            game.points = 0n; game.clickPower = 1n;
            game.upgradeLevel = 0; game.jarvisLevel = 0;
            game.rebirths++;
            document.getElementById('effect-layer').innerHTML = "";
            render();
        }
    }

    render();
</script>

</body>
</html>
