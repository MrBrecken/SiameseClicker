<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siamese Agency Clicker</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #000000;
            --secondary: rgba(243, 244, 246, 0.8);
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- THE MOVING LIQUID B&W BACKGROUND --- */
        #liquid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('image_a96080.jpg');
            background-size: cover;
            filter: grayscale(100%) brightness(1.1) opacity(0.2);
            z-index: -2;
            animation: liquidFlow 20s ease-in-out infinite;
        }

        @keyframes liquidFlow {
            0% { background-position: 0% 50%; transform: scale(1); }
            50% { background-position: 100% 50%; transform: scale(1.1); }
            100% { background-position: 0% 50%; transform: scale(1); }
        }

        /* Container for upgrade images that appear in background */
        #effect-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* --- Main Layout --- */
        #game-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        #sidebar {
            width: 380px;
            border-left: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        #points {
            font-size: 5rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -3px;
            text-align: center;
        }

        /* --- The Clicker --- */
        #clicker-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 20px;
        }

        #clicker-image {
            width: 350px;
            height: 350px;
            object-fit: contain;
        }

        #clicker-container:active { transform: scale(0.9); }

        /* --- Upgrade Styling --- */
        .upgrade-card {
            background: var(--secondary);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .upgrade-card:hover:not(.locked) {
            background: #fff;
            border-color: #000;
            transform: translateX(-5px);
        }

        .upgrade-card.locked { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }

        .upgrade-icon {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .upgrade-info { flex: 1; }
        .u-name { font-weight: 800; font-size: 0.9rem; display: block; }
        .u-cost { font-weight: 700; font-size: 0.8rem; color: #666; }

        /* --- Floating Loops --- */
        .floating-item {
            position: absolute;
            width: 80px;
            height: 80px;
            opacity: 0.3;
            animation: floatLoop 15s linear infinite;
        }

        @keyframes floatLoop {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(100px, 50px) rotate(90deg); }
            50% { transform: translate(0, 150px) rotate(180deg); }
            75% { transform: translate(-100px, 50px) rotate(270deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        .particle {
            position: absolute;
            font-weight: 900;
            pointer-events: none;
            animation: pOut 0.8s ease-out forwards;
        }

        @keyframes pOut {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -120px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="liquid-bg"></div>
<div id="effect-layer"></div>

<div id="game-view">
    <div style="text-align: center;">
        <div style="font-weight: 900; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px;">Siamese Wealth</div>
        <h1 id="points">0</h1>
    </div>

    <div id="clicker-container">
        <img id="clicker-image" src="IMG_2109-removebg-preview.png" alt="The Idiot">
    </div>
</div>

<div id="sidebar">
    <h2 style="font-weight: 900; margin-bottom: 20px;">AGENCY UPGRADES</h2>
    <div id="upgrades-list"></div>
    
    <div id="rebirth-area" style="margin-top: auto; padding-top: 20px;">
        <button id="rebirth-btn" style="width:100%; padding:15px; background:#000; color:#fff; border:none; font-weight:900; border-radius:8px; cursor:pointer;">REBIRTH</button>
        <div id="rebirth-stat" style="text-align:center; font-size:0.7rem; font-weight:700; margin-top:10px;">0 REBIRTHS</div>
    </div>
</div>

<script>
    let game = {
        points: 0n,
        clickPower: 1n,
        rebirths: 0n,
        upgradeLevel: 0
    };

    const upgradeData = [
        { name: "Rhythia Sync", img: "rhythia-steam.png" },
        { name: "Mugshot Protocol", img: "OIP.webp" },
        { name: "Diddy Synergy", img: "OIP (1).webp" },
        { name: "Noob Admin", img: "togif.gif" },
        { name: "CP Strategy", img: "togif-1.gif" },
        { name: "WhoIs Alter", img: "whoisalter.png" },
        { name: "Max Optimization", img: "IMG_1114.jpg" }
    ];

    function format(n) {
        if (n < 1000n) return n.toString();
        const units = ["", "k", "M", "B", "T", "Qa", "Qi"];
        let s = n.toString();
        let unitIdx = Math.floor((s.length - 1) / 3);
        let digits = s.length % 3 || 3;
        return s.substring(0, digits) + "." + s.substring(digits, digits + 2) + units[unitIdx];
    }

    function spawnFloatingBg(imgSrc) {
        const img = document.createElement('img');
        img.src = imgSrc;
        img.className = 'floating-item';
        img.style.left = Math.random() * 80 + 10 + "%";
        img.style.top = Math.random() * 80 + 10 + "%";
        img.style.animationDuration = (10 + Math.random() * 20) + "s";
        document.getElementById('effect-layer').appendChild(img);
    }

    function render() {
        document.getElementById('points').innerText = format(game.points);
        document.getElementById('rebirth-stat').innerText = `${game.rebirths} REBIRTHS`;
        
        const list = document.getElementById('upgrades-list');
        list.innerHTML = "";
        
        const nextUpgrade = upgradeData[game.upgradeLevel % upgradeData.length];
        const cost = 10n ** BigInt(game.upgradeLevel + 1) * 5n;

        const card = document.createElement('div');
        card.className = `upgrade-card ${game.points < cost ? 'locked' : ''}`;
        card.innerHTML = `
            <img src="${nextUpgrade.img}" class="upgrade-icon">
            <div class="upgrade-info">
                <span class="u-name">${nextUpgrade.name}</span>
                <span class="u-cost">Cost: ${format(cost)}</span>
            </div>
        `;

        if (game.points >= cost) {
            card.onclick = () => {
                game.points -= cost;
                game.clickPower += (cost / 5n);
                spawnFloatingBg(nextUpgrade.img);
                game.upgradeLevel++;
                render();
            };
        }
        list.appendChild(card);
    }

    document.getElementById('clicker-container').onmousedown = (e) => {
        const gain = game.clickPower * (2n ** game.rebirths);
        game.points += gain;
        
        const p = document.createElement('div');
        p.className = 'particle';
        p.innerText = `+${format(gain)}`;
        p.style.left = e.clientX + "px";
        p.style.top = e.clientY + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
        render();
    };

    render();
</script>

</body>
</html>
