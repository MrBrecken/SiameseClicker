<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siamese Agency Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <h1>Siamese Agency Clicker</h1>

        <div id="stats">
            <p>Siamese Points: <span id="points">0</span></p>
            <p>Click Value: <span id="click-value">1</span></p>
            <p>Rebirths: <span id="rebirths">0</span></p>
        </div>

        <div id="click-area">
            <img id="clicker-image" src="image_2.png" alt="Click for points">
        </div>

        <div id="upgrades">
            <h2>Upgrades</h2>
            <button id="rebirth-btn">Rebirth (Cost: 1000 Points)</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
