<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siamese Agency Clicker 2</title>
    <style>
        /* Base page styling and flat animated background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #111;
            /* Cycles through clean, solid pastel colors */
            animation: bgShift 12s infinite alternate linear;
            background-color: #ffd1dc; 
        }

        @keyframes bgShift {
            0% { background-color: #ffd1dc; }
            33% { background-color: #d1ffd1; }
            66% { background-color: #d1e8ff; }
            100% { background-color: #fff0d1; }
        }

        /* Main game container with strict, flat styling */
        .game-container {
            background-color: #ffffff;
            border: 3px solid #111;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            border-bottom: 2px solid #111;
            padding-bottom: 0.5rem;
        }

        /* Currency display */
        .currency-box {
            font-size: 1.25rem;
            font-weight: bold;
            margin: 1.5rem 0;
            padding: 0.75rem;
            background-color: #eee;
            border: 2px solid #111;
            border-radius: 4px;
            display: none; /* Hidden until unlocked */
        }

        /* The clickable image */
        #clicker-image {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #111;
            cursor: pointer;
            /* Slick, snappy interaction */
            transition: transform 0.05s ease-out;
            user-select: none;
            -webkit-user-drag: none;
        }

        #clicker-image:active {
            transform: scale(0.92);
        }

        /* Shop Section */
        .shop-container {
            margin-top: 2rem;
            padding: 1rem;
            background-color: #f9f9f9;
            border: 2px dashed #666;
            border-radius: 4px;
        }

        .shop-container h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.2rem;
        }
        
        .shop-container p {
            margin: 0;
            color: #444;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Siamese Agency Clicker 2</h1>
        
        <div id="currency-box" class="currency-box">
            Siamese Clicks: <span id="click-count">0</span>
        </div>

        <img id="clicker-image" src="siamese-Photoroom.jpg" alt="Click Me!">

        <div class="shop-container">
            <h2>Shop</h2>
            <p>[ Work in Progress ]</p>
        </div>
    </div>

    <script>
        // Game Logic Variables
        let isUnlocked = false;
        let siameseClicks = 0;

        // DOM Elements
        const clickerImage = document.getElementById('clicker-image');
        const currencyBox = document.getElementById('currency-box');
        const clickCountDisplay = document.getElementById('click-count');

        // Main Click Event
        clickerImage.addEventListener('click', () => {
            if (!isUnlocked) {
                // First click: Unlock the currency
                isUnlocked = true;
                currencyBox.style.display = 'block';
            } else {
                // Subsequent clicks: Add currency
                siameseClicks++;
                clickCountDisplay.textContent = siameseClicks;
            }
        });
    </script>

</body>
</html>
