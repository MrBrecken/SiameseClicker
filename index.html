<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siamese Agency Clicker</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --secondary: rgba(243, 244, 246, 0.9);
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; user-select: none; -webkit-user-drag: none; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- NATIVE LIQUID B&W BACKGROUND --- */
        #liquid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #ebebeb 0%, #ffffff 100%);
        }

        #liquid-motion {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: -1;
            background: repeating-radial-gradient(circle at 0% 0%, transparent 0, transparent 40px, rgba(0,0,0,0.03) 40px, rgba(0,0,0,0.03) 80px);
            animation: move 20s linear infinite;
            filter: blur(2px);
            opacity: 0.6;
        }

        @keyframes move {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #effect-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* --- Layout --- */
        #game-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        #sidebar {
            width: 400px;
            border-left: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #points { font-size: 5.5rem; font-weight: 900; margin: 0; letter-spacing: -4px; }

        /* --- Nav --- */
        .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .nav-btn { background: #000; color: #fff; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-weight: 900; }

        /* --- Clicker --- */
        #clicker-container { cursor: pointer; transition: transform 0.1s; }
        #clicker-image { width: 340px; height: 340px; object-fit: contain; }
        #clicker-container:active { transform: scale(0.92); }

        /* --- Upgrades --- */
        .upgrade-card {
            background: var(--secondary);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .upgrade-card:hover:not(.locked) { background: #fff; border-color: #000; }
        .upgrade-card.locked { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }

        .upgrade-icon { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; background: #eee; }
        .u-name { font-weight: 900; font-size: 1rem; display: block; }
        .u-cost { font-weight: 700; font-size: 0.85rem; color: #555; }

        .particle {
            position: absolute; font-weight: 900; pointer-events: none; color: #000;
            animation: pOut 0.7s ease-out forwards;
        }
        @keyframes pOut {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -100px) scale(1.4); opacity: 0; }
        }

        .floating-item {
            position: absolute; width: 70px; height: 70px; opacity: 0.3;
            animation: floatLoop 25s linear infinite;
        }
        @keyframes floatLoop {
            0% { transform: translate(0,0) rotate(0deg); }
            100% { transform: translate(20vw, 20vh) rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="liquid-overlay"></div>
<div id="liquid-motion"></div>
<div id="effect-layer"></div>

<div id="game-view">
    <div style="text-align: center; margin-bottom: 30px;">
        <div style="font-weight: 900; letter-spacing: 3px; font-size: 0.8rem; color: #888;">SIAMESE AGENCY</div>
        <h1 id="points">0</h1>
    </div>

    <div id="clicker-container">
        <img id="clicker-image" src="IMG_2109-removebg-preview.png" alt="Idiot Clicker">
    </div>
</div>

<div id="sidebar">
    <div class="nav-header">
        <button class="nav-btn" onclick="changePage(-1)">←</button>
        <h2 id="page-title" style="font-weight: 900; font-size: 1.1rem; margin: 0;">AGENCY UPGRADES</h2>
        <button class="nav-btn" onclick="changePage(1)">→</button>
    </div>

    <div id="upgrades-list" style="flex: 1; overflow-y: auto; padding-right: 5px;"></div>
    
    <div style="margin-top: 20px;">
        <button id="rebirth-btn" onclick="rebirth()" style="width:100%; padding:18px; background:#000; color:#fff; border:none; font-weight:900; border-radius:12px; cursor:pointer;">REBIRTH</button>
    </div>
</div>

<script>
    let game = {
        points: 0n,
        clickPower: 1n,
        rebirths: 0n,
        agencyIdx: 0,
        jarvisIdx: 0,
        page: 0
    };

    // Updated with your provided images
    const agencyUpgrades = [
        { name: "Vulnus Core", img: "Annotation 2025-12-18 203140.png" },
        { name: "Baldi Audio", img: "baldi.png-removebg-preview.png" },
        { name: "Blossom Rage", img: "blossom.gif" },
        { name: "The Drive", img: "bradarwhatisthis.gif" },
        { name: "Merch Flash", img: "IMG_3018.jpg" },
        { name: "King's Gaze", img: "Screenshot 2026-01-11 211640.jpg" }
    ];

    function format(n) {
        if (n < 1000n) return n.toString();
        const units = ["", "k", "M", "B", "T", "Qa", "Qi"];
        let s = n.toString();
        let unitIdx = Math.floor((s.length - 1) / 3);
        let digits = s.length % 3 || 3;
        return s.substring(0, digits) + "." + s.substring(digits, digits + 2) + units[unitIdx];
    }

    function changePage(dir) {
        game.page = (game.page + dir + 2) % 2;
        document.getElementById('page-title').innerText = game.page === 0 ? "AGENCY UPGRADES" : "JARVIS BOTS";
        render();
    }

    function spawnFloating(src) {
        if (!src) return;
        const img = document.createElement('img');
        img.src = src;
        img.className = 'floating-item';
        img.style.left = Math.random() * 90 + "%";
        img.style.top = Math.random() * 90 + "%";
        document.getElementById('effect-layer').appendChild(img);
    }

    function render() {
        document.getElementById('points').innerText = format(game.points);
        const list = document.getElementById('upgrades-list');
        list.innerHTML = "";

        if (game.page === 0) {
            const up = agencyUpgrades[game.agencyIdx % agencyUpgrades.length];
            const cost = 10n ** BigInt(game.agencyIdx + 1) * 8n;
            createCard(up.name, up.img, cost, () => {
                game.points -= cost;
                game.clickPower += (cost / 12n);
                spawnFloating(up.img);
                game.agencyIdx++;
                render();
            });
        } else {
            const cost = 10n ** BigInt(game.jarvisIdx + 2) * 5n;
            createCard(`Jarvis Bot v${game.jarvisIdx + 1}`, "", cost, () => {
                game.points -= cost;
                game.clickPower += (cost / 6n);
                game.jarvisIdx++;
                render();
            });
        }
        
        const rCost = 1000000n * (50n ** game.rebirths);
        document.getElementById('rebirth-btn').innerText = `REBIRTH (${format(rCost)})`;
        document.getElementById('rebirth-btn').disabled = game.points < rCost;
    }

    function createCard(name, img, cost, onClick) {
        const card = document.createElement('div');
        card.className = `upgrade-card ${game.points < cost ? 'locked' : ''}`;
        card.innerHTML = `
            <img src="${img}" class="upgrade-icon">
            <div class="upgrade-info">
                <span class="u-name">${name}</span>
                <span class="u-cost">Cost: ${format(cost)}</span>
            </div>
        `;
        if (game.points >= cost) card.onclick = onClick;
        document.getElementById('upgrades-list').appendChild(card);
    }

    document.getElementById('clicker-container').onmousedown = (e) => {
        const val = game.clickPower * (2n ** game.rebirths);
        game.points += val;
        const p = document.createElement('div');
        p.className = 'particle';
        p.innerText = `+${format(val)}`;
        p.style.left = e.clientX + "px"; p.style.top = e.clientY + "px";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 700);
        render();
    };

    function rebirth() {
        game.points = 0n; game.clickPower = 1n;
        game.agencyIdx = 0; game.jarvisIdx = 0;
        game.rebirths++;
        document.getElementById('effect-layer').innerHTML = "";
        render();
    }

    render();
</script>

</body>
</html>
