<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siamese Agency Clicker</title>
    
    <link rel="icon" type="image/png" href="ecc268d7-06ed-40cb-8294-4bd7479bc3d0.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --bg: #ffffff; --text: #000000; --accent: #007AFF; --secondary: #f0f0f0; }
        * { box-sizing: border-box; user-select: none; -webkit-user-drag: none; outline: none; }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #fff; pointer-events: none; }

        #game-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 1; }
        #sidebar { width: 440px; border-left: 3px solid #000; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); display: flex; flex-direction: column; padding: 30px; z-index: 10; }

        #points { font-size: 6rem; font-weight: 900; margin: 0; letter-spacing: -5px; line-height: 0.85; word-break: break-all; }
        #stats { font-weight: 800; color: #444; margin-top: 15px; font-size: 1.1rem; }

        #minigames-trigger { position: fixed; top: 30px; left: 30px; background: #000; color: #fff; border: none; padding: 18px 28px; border-radius: 16px; cursor: pointer; font-weight: 900; font-size: 0.8rem; letter-spacing: 1.5px; z-index: 100; }
        #gem-display { position: fixed; top: 30px; left: 220px; font-weight: 900; font-size: 1.2rem; color: #000; z-index: 100; background: rgba(255,255,255,0.8); padding: 5px 15px; border-radius: 10px; }
        #jarvis-display { position: fixed; top: 80px; left: 30px; font-weight: 900; font-size: 1rem; color: #ff9d00; z-index: 100; background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 10px; }

        .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .nav-btn { background: #000; color: #fff; border: none; border-radius: 10px; width: 50px; height: 50px; cursor: pointer; font-size: 2rem; display: flex; align-items: center; justify-content: center; }

        #clicker-container { cursor: pointer; transition: transform 0.05s; margin: 40px 0; z-index: 5; }
        #clicker-image { width: 360px; height: 360px; object-fit: contain; }
        #clicker-container:active { transform: scale(0.9); }

        .upgrade-card { background: var(--secondary); border-radius: 24px; padding: 20px; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; gap: 20px; border: 3px solid transparent; }
        .upgrade-card.locked { opacity: 0.2; filter: grayscale(1); cursor: not-allowed; }
        .upgrade-icon { width: 75px; height: 75px; border-radius: 16px; object-fit: cover; }
        .u-name { font-weight: 900; font-size: 1.2rem; display: block; text-transform: uppercase; }
        .u-cost { font-weight: 700; font-size: 0.95rem; color: #555; }

        #settings-trigger { position: fixed; bottom: 30px; left: 30px; background: #000; color: #fff; border: none; padding: 18px 28px; border-radius: 16px; cursor: pointer; font-weight: 900; font-size: 0.8rem; letter-spacing: 1.5px; z-index: 100; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .popup-box { background: #fff; padding: 40px; border-radius: 30px; width: 400px; text-align: center; }

        #flappy-container, #dash-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #flappy-container { background: #4ec0ca; }
        #dash-container { background: #1a1a1a; }
        
        canvas.minigame-canvas { background: #fff; display: block; border: 5px solid #000; border-radius: 20px; cursor: pointer; }

        #rebirth-btn { width: 100%; padding: 25px; background: #000; color: #fff; border: none; font-weight: 900; border-radius: 20px; font-size: 1.3rem; cursor: pointer; transition: 0.3s; }
        #rebirth-btn:disabled { background: #eee !important; color: #aaa !important; box-shadow: none !important; }
        .particle { position: absolute; font-weight: 900; pointer-events: none; color: #000; animation: pOut 0.8s forwards; font-size: 2.2rem; z-index: 99; }
        @keyframes pOut { 0% { transform: translate(-50%,-50%); opacity: 1; } 100% { transform: translate(-50%,-200px); opacity: 0; } }
        
        .io-btn { margin-top: 10px; width: 100%; padding: 12px; background: #f0f0f0; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 0.7rem; }

        #dylan-flash { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: white; color: black; z-index: 9999; display: none; align-items: center; justify-content: center; font-size: 8rem; font-weight: 900; text-align: center; animation: flashScale 0.2s infinite alternate; }
        @keyframes flashScale { from { transform: scale(1); } to { transform: scale(1.1); } }

        .death-screen { display: none; flex-direction: column; align-items: center; justify-content: center; }
        .death-stat { font-weight: 900; font-size: 1.5rem; margin: 5px 0; }

        .falling-jarvis { position: fixed; top: -100px; width: 80px; height: 80px; cursor: pointer; z-index: 500; object-fit: contain; }
        @keyframes jarvisFall { 0% { top: -100px; transform: rotate(0deg); } 100% { top: 110vh; transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="dylan-flash">DYLAN JARVIS</div>
<canvas id="bg-canvas"></canvas>
<audio id="main-music" loop><source src="background.mp3.mp3" type="audio/mpeg"></audio>

<div id="game-view">
    <div style="text-align: center;">
        <div style="font-weight: 900; letter-spacing: 6px; font-size: 0.75rem; color: #999; text-transform: uppercase;">The Siamese Agency</div>
        <h1 id="points">0</h1>
        <div id="stats">+1/CLICK • 0/SEC</div>
    </div>
    <div id="clicker-container"><img id="clicker-image" src="IMG_2109-removebg-preview.png"></div>
</div>

<div id="sidebar">
    <div class="nav-header">
        <button class="nav-btn" onclick="changePage(-1)">‹</button>
        <h2 id="page-title" style="font-weight: 900;">UPGRADES</h2>
        <button class="nav-btn" onclick="changePage(1)">›</button>
    </div>
    <div id="upgrades-list" style="flex: 1; overflow-y: auto;"></div>
    <div style="margin-top: 30px; border-top: 3px solid #000; padding-top: 25px;">
        <button id="rebirth-btn" onclick="rebirth()">REBIRTH (1e100)</button>
        <p id="rebirth-count" style="text-align: center; font-weight: 900; color: #666;">0 TOTAL REBIRTHS</p>
    </div>
</div>

<button id="minigames-trigger" onclick="toggleOverlay('minigame-menu')">MINIGAMES</button>
<div id="gem-display">💎 <span id="gem-count">0</span></div>
<div id="jarvis-display">🟡 <span id="jarvis-count">0</span> Jarvis Coins</div>

<button id="settings-trigger" onclick="toggleOverlay('settings-overlay')">SETTINGS</button>

<div id="settings-overlay" class="overlay" onclick="if(event.target.id==='settings-overlay') toggleOverlay('settings-overlay')">
    <div class="popup-box">
        <h2 style="font-weight: 900; font-size: 2.5rem;">OPTIONS</h2>
        <button onclick="toggleMute()" id="mute-btn" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:15px; font-weight:900; margin-bottom:10px;">AUDIO: ON</button>
        <button onclick="exportData()" class="io-btn">EXPORT BRAILLE DATA</button>
        <button onclick="importData()" class="io-btn">IMPORT BRAILLE DATA</button>
        <div style="margin-top: 20px; font-weight: 900; color: #aaa; cursor: pointer;" onclick="toggleOverlay('settings-overlay')">CLOSE</div>
    </div>
</div>

<div id="minigame-menu" class="overlay" onclick="if(event.target.id==='minigame-menu') toggleOverlay('minigame-menu')">
    <div class="popup-box">
        <h2 style="font-weight: 900; font-size: 2.5rem;">MINIGAMES</h2>
        <button onclick="startFlappy()" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:15px; font-weight:900; margin-bottom: 10px;">FLAPPY SIAMESE</button>
        <button onclick="startDylanDash()" style="width:100%; padding:20px; background:#007AFF; color:#fff; border-radius:15px; font-weight:900;">DYLAN DASH</button>
        <div style="margin-top: 30px; font-weight: 900; color: #aaa; cursor: pointer;" onclick="toggleOverlay('minigame-menu')">CLOSE</div>
    </div>
</div>

<div id="flappy-container">
    <div id="flappy-gameplay" style="display: flex; flex-direction: column; align-items: center;">
        <div style="color: black; font-weight: 900; font-size: 2rem; margin-bottom: 10px;">Score: <span id="f-score">0</span></div>
        <canvas id="flappy-canvas" class="minigame-canvas"></canvas>
        <button onclick="exitFlappy()" style="margin-top: 20px; padding: 15px 30px; background: #000; color: #fff; border: none; border-radius: 10px; font-weight: 900; cursor: pointer;">QUIT GAME</button>
    </div>
    <div id="flappy-death" class="popup-box death-screen">
        <h2 style="font-weight: 900; font-size: 3rem; margin-top: 0;">YOU DIED</h2>
        <div class="death-stat">SCORE: <span id="f-death-score">0</span></div>
        <div class="death-stat">BEST: <span id="f-death-best">0</span></div>
        <div class="death-stat" style="color: #007AFF;">GEMS EARNED: <span id="f-death-gems">0</span></div>
        <button onclick="startFlappy()" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:15px; font-weight:900; margin-top: 20px;">RETRY</button>
        <button onclick="exitFlappy()" style="width:100%; padding:20px; background:#f0f0f0; color:#000; border-radius:15px; font-weight:900; margin-top: 10px;">EXIT</button>
    </div>
</div>

<div id="dash-container">
    <div id="dash-gameplay" style="display: flex; flex-direction: column; align-items: center;">
        <div style="color: white; font-weight: 900; font-size: 2rem; margin-bottom: 10px;">Spikes: <span id="d-score">0</span></div>
        <canvas id="dash-canvas" class="minigame-canvas"></canvas>
        <button onclick="exitDash()" style="margin-top: 20px; padding: 15px 30px; background: #fff; color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer;">QUIT GAME</button>
    </div>
    <div id="dash-death" class="popup-box death-screen">
        <h2 style="font-weight: 900; font-size: 3rem; margin-top: 0;">YOU DIED</h2>
        <div class="death-stat">SPIKES JUMPED: <span id="d-death-score">0</span></div>
        <div class="death-stat">BEST RUN: <span id="d-death-best">0</span></div>
        <div class="death-stat" style="color: #007AFF;">GEMS COLLECTED: <span id="d-death-gems">0</span></div>
        <button onclick="startDylanDash()" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:15px; font-weight:900; margin-top: 20px;">RETRY</button>
        <button onclick="exitDash()" style="width:100%; padding:20px; background:#f0f0f0; color:#000; border-radius:15px; font-weight:900; margin-top: 10px;">EXIT</button>
    </div>
</div>

<script>
    const MAX_VAL = 10n ** (10n ** 9n); // 1e1 Billion Cap

    let game = { 
        points: 0n, clickPower: 1n, pps: 0n, rebirths: 0n, megaRebirths: 0n, agencyIdx: 0, jarvisIdx: 0, page: 0, 
        muted: false, gems: 0, jarvisCoins: 0n, musicStarted: false, pointMultiplier: 100n, gemsMultiplier: 1, 
        hasOversallsOpal: false, hasExtraLife: false, flappyRecord: 0, dashRecord: 0,
        jarvisMultiplier: 1n, 
        dingleberry: { b: false, s: false, g: false, d: false }
    };
    
    let ashcroftPurchases = { dylan: 0 };
    const agencyImgs = ["Annotation 2025-12-18 203140.png","IMG_1114.png","IMG_3018.png","OIP (1).webp","OIP.webp","Screenshot 2026-01-11 211640.png","baldi.png-removebg-preview.png","blossom.gif","bradarwhatisthis.gif","dahmer-jeffrey.gif","image.png","rhythia-steam.png","rrxc12ej6dqtf7a18m4dy3vdk9vm.jpg","togif-1.gif","whoisalter.png"];
    const ashcroftImgs = ["dylandiamond.png", "oliversopal.png", "stevenssaphire.png"];
    
    const birdSprite = new Image(); birdSprite.src = 'IMG_3017.jpg';
    const pipeSprite = new Image(); pipeSprite.src = 'image0_15.gif.jpg';
    const dylanSprite = new Image(); dylanSprite.src = 'jdash.png';
    const spikeSprite = new Image(); spikeSprite.src = 'spike1---image.png';
    const dashBgImg = new Image(); dashBgImg.src = 'background.webp';

    function toBraille(str) { return str.split('').map(c => String.fromCharCode(0x2800 + (c.charCodeAt(0) - 7))).join(''); }
    function fromBraille(brl) { return brl.split('').map(c => String.fromCharCode((c.charCodeAt(0) - 0x2800) + 7)).join(''); }
    function stringifyGame(obj) { return JSON.stringify(obj, (key, value) => typeof value === 'bigint' ? value.toString() + 'n' : value); }
    function parseGame(json) { return JSON.parse(json, (key, value) => { if (typeof value === 'string' && /^-?\d+n$/.test(value)) return BigInt(value.slice(0, -1)); return value; }); }

    function exportData() { const json = stringifyGame({game, ashcroftPurchases}); navigator.clipboard.writeText(toBraille(json)); alert("BRAILLE DATA COPIED"); }
    function importData() { const raw = prompt("PASTE BRAILLE DATA:"); if(!raw) return; try { const decoded = fromBraille(raw.trim()); const parsed = parseGame(decoded); Object.assign(game, parsed.game); Object.assign(ashcroftPurchases, parsed.ashcroftPurchases); render(); alert("DATA IMPORTED"); } catch(e) { alert("INVALID BRAILLE DATA"); } }
    function saveToLocal() { localStorage.setItem('siameseSave', stringifyGame({game, ashcroftPurchases})); }
    function loadFromLocal() { const saved = localStorage.getItem('siameseSave'); if (saved) { try { const parsed = parseGame(saved); Object.assign(game, parsed.game); Object.assign(ashcroftPurchases, parsed.ashcroftPurchases); } catch(e) {} } }

    window.onload = () => { loadFromLocal(); render(); };

    function render() {
        const rebirthMulti = 2n ** game.rebirths;
        const megaMulti = 5n ** game.megaRebirths;
        const ptsMultNum = game.pointMultiplier / 100n;
        
        document.getElementById('points').innerText = format(game.points);
        document.getElementById('gem-count').innerText = game.gems;
        document.getElementById('jarvis-count').innerText = format(game.jarvisCoins);
        
        const cPwr = game.clickPower * rebirthMulti * megaMulti * ptsMultNum;
        const sPwr = game.pps * rebirthMulti * megaMulti * ptsMultNum;
        document.getElementById('stats').innerText = `+${format(cPwr)}/CLICK • ${format(sPwr)}/SEC`;
        
        const list = document.getElementById('upgrades-list');
        list.innerHTML = "";
        if (game.page === 0) {
            const cost = 50n * (12n ** BigInt(game.agencyIdx));
            createCard(getLockedName(game.agencyIdx), agencyImgs[game.agencyIdx % agencyImgs.length], cost, () => { if(game.agencyIdx === 0) triggerFlash(); game.points -= cost; game.clickPower += (cost/10n)+3n; game.agencyIdx++; render(); });
        } else if (game.page === 1) {
            const cost = 1000n * (15n ** BigInt(game.jarvisIdx));
            createCard("Jarvis Bot Mk " + (game.jarvisIdx+1), "OIP.webp", cost, () => { game.points -= cost; game.pps += (cost/8n)+10n; game.jarvisIdx++; render(); });
        } else if (game.page === 2) {
            renderJewels();
        } else if (game.page === 3) {
            renderDingleberries();
        }

        const rCost = 10n ** (100n * (game.rebirths + 1n));
        const rBtn = document.getElementById('rebirth-btn');
        rBtn.innerText = `REBIRTH (${format(rCost)})`;
        rBtn.disabled = game.points < rCost;
    }

    function format(n) {
        if (n < 1000n) return n.toString();
        let s = n.toString();
        let exp = s.length - 1;
        if (exp >= 1000000000) return "1e" + (exp / 1000000000).toFixed(2) + "B";
        if (exp >= 100) return s[0] + "." + s.substring(1,3) + "e" + exp;
        const suffixes = ["", "k", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc"];
        let unitIdx = Math.floor(exp / 3);
        let digits = s.length % 3 || 3;
        return s.substring(0, digits) + "." + s.substring(digits, digits + 2) + (suffixes[unitIdx] || "e" + exp);
    }

    function triggerMainClick(x, y) {
        if(!game.musicStarted) { document.getElementById('main-music').play(); game.musicStarted = true; }
        const rebirthMulti = 2n ** game.rebirths; const megaMulti = 5n ** game.megaRebirths; const ptsMultNum = game.pointMultiplier / 100n;
        const val = game.clickPower * rebirthMulti * megaMulti * ptsMultNum;
        game.points += val; if(game.points > MAX_VAL) game.points = MAX_VAL;
        const p = document.createElement('div'); p.className = 'particle'; p.innerText = `+${format(val)}`; p.style.left = x + "px"; p.style.top = y + "px"; document.body.appendChild(p); setTimeout(() => p.remove(), 800); render();
    }

    function spawnJarvisCoin() {
        if (fActive || dActive) return;
        const coin = document.createElement('img');
        coin.src = 'goldjarvis.png'; coin.className = 'falling-jarvis';
        coin.style.left = Math.random() * (window.innerWidth - 100) + "px";
        coin.style.animation = "jarvisFall 6s linear forwards";
        coin.onmousedown = (e) => {
            e.stopPropagation();
            const reward = 1n * game.jarvisMultiplier;
            game.jarvisCoins += reward;
            const p = document.createElement('div'); p.className = 'particle'; p.innerText = `+${format(reward)} COINS`; p.style.color="#ff9d00"; p.style.left = e.clientX + "px"; p.style.top = e.clientY + "px"; document.body.appendChild(p); setTimeout(() => p.remove(), 800);
            render(); coin.remove();
        };
        document.body.appendChild(coin);
        setTimeout(() => { if(coin.parentElement) coin.remove(); }, 6000);
    }
    setInterval(spawnJarvisCoin, 60000);

    /* Original Helper functions for Cards and Minigames Re-integrated */
    function createCard(name, src, cost, onClick) { const card = document.createElement('div'); card.className = `upgrade-card ${game.points < cost ? 'locked' : ''}`; card.innerHTML = `<img src="${src}" class="upgrade-icon" onerror="this.src='OIP.webp'"><div style="flex:1"><span class="u-name">${name}</span><span class="u-cost">${format(cost)} Points</span></div>`; if (game.points >= cost) card.onclick = onClick; document.getElementById('upgrades-list').appendChild(card); }
    function renderJewels() { const gemCost = BigInt(5 * (2 ** ashcroftPurchases['dylan'])); createJewelCard("Dylans Diamond", ashcroftImgs[0], gemCost, () => { game.gems -= Number(gemCost); game.gemsMultiplier *= 2; ashcroftPurchases['dylan']++; render(); }, game.gems < Number(gemCost)); }
    function createJewelCard(name, src, cost, onClick, isLocked) { const card = document.createElement('div'); card.className = `upgrade-card ${isLocked ? 'locked' : ''}`; card.innerHTML = `<img src="${src}" class="upgrade-icon" onerror="this.src='OIP.webp'"><div style="flex:1"><span class="u-name">${name}</span><span class="u-cost">${format(cost)} Gems</span></div>`; if (!isLocked) card.onclick = onClick; document.getElementById('upgrades-list').appendChild(card); }
    function renderDingleberries() { createDingleberryCard("Bronze Jarvis", "bronzejarvis.png", 5n, () => { game.jarvisCoins -= 5n; game.jarvisMultiplier *= 5n; game.dingleberry.b = true; render(); }, game.jarvisCoins < 5n || game.dingleberry.b, game.dingleberry.b); }
    function createDingleberryCard(name, src, cost, onClick, isLocked, isBought) { const card = document.createElement('div'); card.className = `upgrade-card ${isLocked ? 'locked' : ''}`; let t = isBought ? "SOLD OUT" : `${format(cost)} Jarvis Coins`; card.innerHTML = `<img src="${src}" class="upgrade-icon" onerror="this.src='OIP.webp'"><div style="flex:1"><span class="u-name">${name}</span><span class="u-cost">${t}</span></div>`; if (!isBought && !isLocked) card.onclick = onClick; document.getElementById('upgrades-list').appendChild(card); }
    function rebirth() { const cost = 10n ** (100n * (game.rebirths + 1n)); if(game.points >= cost) { game.points = 0n; game.clickPower = 1n; game.pps = 0n; game.agencyIdx = 0; game.jarvisIdx = 0; game.rebirths++; render(); } }
    function toggleOverlay(id) { const s = document.getElementById(id); s.style.display = s.style.display === 'flex' ? 'none' : 'flex'; }
    function toggleMute() { game.muted = !game.muted; document.getElementById('main-music').muted = game.muted; }
    function changePage(dir) { game.page = (game.page + dir + 4) % 4; document.getElementById('page-title').innerText = ["UPGRADES", "JARVIS BOTS", "ASHCROFTS JEWELS", "DYLANS DINGLEBERRIES"][game.page]; render(); }
    function triggerFlash() { const f = document.getElementById('dylan-flash'); f.style.display = 'flex'; setTimeout(() => f.style.display = 'none', 1500); }
    let lockedNames = []; function getLockedName(i) { while (lockedNames.length <= i) lockedNames.push(`Agency Upgrade #${lockedNames.length + 1}`); return lockedNames[i]; }

    /* Key Listeners */
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            if (fActive) { birdV = -4.5; e.preventDefault(); } 
            else if (dActive && !dJumping) { dV = -10; dJumping = true; e.preventDefault(); } 
            else if (!fActive && !dActive) { triggerMainClick(window.innerWidth/2, window.innerHeight/2); e.preventDefault(); }
        }
    });

    document.getElementById('clicker-container').onmousedown = (e) => triggerMainClick(e.clientX, e.clientY);
    setInterval(() => { const rM = 2n**game.rebirths; const mM = 5n**game.megaRebirths; const pM = game.pointMultiplier/100n; game.points += (game.pps * rM * mM * pM); if(game.points > MAX_VAL) game.points = MAX_VAL; render(); saveToLocal(); }, 1000);

    /* Minigame Placeholders - Logic remains same as previous stable version */
    let fActive = false, dActive = false, birdV = 0, dV = 0, dJumping = false;
    function startFlappy() { fActive = true; toggleOverlay('minigame-menu'); document.getElementById('flappy-container').style.display='flex'; }
    function exitFlappy() { fActive = false; document.getElementById('flappy-container').style.display='none'; }
    function startDylanDash() { dActive = true; toggleOverlay('minigame-menu'); document.getElementById('dash-container').style.display='flex'; }
    function exitDash() { dActive = false; document.getElementById('dash-container').style.display='none'; }
</script>
</body>
</html>
